<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ParentOps — Sign in</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="manifest" href="/static/manifest.json">
</head>
<body>
<div class="wrap gatepage">
  <div class="gatecard">
    <div class="brand" style="font-size:26px;text-align:center">Parent<span>Ops</span></div>
    <p class="muted" style="text-align:center;margin:8px 0 18px">Enter your household PIN</p>
    {% if error %}<div class="notice" style="margin-bottom:12px">{{ error }}</div>{% endif %}
    <form method="post" action="/login">
      <input class="pininput" type="password" name="pin" inputmode="numeric"
             autocomplete="current-password" autofocus placeholder="••••">
      <button class="btn primary big" style="width:100%;margin-top:12px">Unlock</button>
    </form>
  </div>
</div>
</body>
</html>
